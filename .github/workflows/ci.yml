name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ledgerhq/ledger-app-builder/ledger-app-builder:latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build for Nano S
        run: make BOLOS_SDK=$NANOS_SDK

      - name: Build for Nano S Plus
        run: |
          make clean
          make BOLOS_SDK=$NANOSP_SDK

      - name: Build for Nano X
        run: |
          make clean
          make BOLOS_SDK=$NANOX_SDK

      - name: Build for Stax
        run: |
          make clean
          make BOLOS_SDK=$STAX_SDK

      - name: Upload plugin binaries
        uses: actions/upload-artifact@v4
        with:
          name: plugin-binaries
          path: bin/

  test:
    name: Ragger tests (speculos)
    runs-on: ubuntu-latest
    needs: build
    # Requires compiled binaries and a full speculos environment;
    # enable by setting the RAGGER_TESTS_ENABLED repository variable to 'true'.
    if: ${{ vars.RAGGER_TESTS_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download plugin binaries
        uses: actions/download-artifact@v4
        with:
          name: plugin-binaries
          path: tests/build

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run Ragger tests
        run: |
          cd tests
          pytest -v -x

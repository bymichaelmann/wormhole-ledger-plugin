name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib

      - name: Clone ethereum-plugin-sdk
        run: |
          git clone --depth 1 https://github.com/LedgerHQ/ethereum-plugin-sdk.git
          echo "ETHEREUM_PLUGIN_SDK=$(pwd)/ethereum-plugin-sdk" >> $GITHUB_ENV

      - name: Build plugin
        run: make all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: build/

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install -r tests/requirements.txt

      - name: Run Ragger tests (speculos)
        run: |
          cd tests
          pytest -v -x
